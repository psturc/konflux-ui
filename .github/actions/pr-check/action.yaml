name: 'Deploy Konflux CI on kind cluster and run Konflux UI E2E tests'
description: 'Reusable action for running konflux-ui E2E test against konflux-ci instance deployed on kind cluster'
inputs:
  job-type:
    description: '"on-pr" or "periodic"'
    required: true
  hac-test-gh-token:
    description: 'Used as HAC_TEST_GH_TOKEN secret'
    required: true
  sealights-token:
    description: 'Used as SEALIGHTS_TOKEN secret'
    required: true
  gh-app-id:
    description: 'Used as GH_APP_ID secret'
    required: true
  gh-app-private-key:
    description: 'Used as GH_APP_PRIVATE_KEY secret'
    required: true
  gh-app-webhook-secret:
    description: 'Used as GH_APP_WEBHOOK_SECRET secret'
    required: true
  quay-test-org:
    description: 'Used as QUAY_TEST_ORG secret'
    required: true
  quay-token-test:
    description: 'Used as QUAY_TOKEN_TEST secret'
    required: true
  smee-url:
    description: 'Used as SMEE_URL secret'
    required: true
  cypress-username:
    description: 'Used as CYPRESS_USERNAME secret'
    required: true
  cypress-password:
    description: 'Used as CYPRESS_PASSWORD secret'
    required: true

runs:
  using: "composite"  
  steps:
    - name: Free Disk Space (Ubuntu)
      uses: jlumbroso/free-disk-space@main
      with:
        # this might remove tools that are actually needed,
        # if set to "true" but frees about 6 GB
        tool-cache: false
        docker-images: false

    # konflux-ci is cloned to /home/runner/work/konflux-ui/konflux-ui
    # as it have to be at home folder to use helm/kind-action@v1 action
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        repository: 'konflux-ci/konflux-ci'
        ref: 'main'

    - name: Disable AppArmor
      # works around a change in ubuntu 24.04 that restricts Linux namespace access
      # for unprivileged users
      run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
      shell: bash

    - name: Create k8s Kind Cluster
      uses: helm/kind-action@v1
      with:
        config: kind-config.yaml
        cluster_name: konflux
    
    - name: Show version information
      run: |
        kubectl version
        kind version
      shell: bash

    - name: List namespaces
      run: |
        kubectl get namespace
      shell: bash

    - name: Deploying Dependencies
      run: |
        ./deploy-deps.sh
      shell: bash

    - name: List namespaces
      run: |
        kubectl get namespace
      shell: bash

    - name: Wait for the dependencies to be ready
      run: |
        ./wait-for-all.sh
      shell: bash

    - name: WORKAROUND - Reduce CPU/Memory requirements in build pipeline
      run: |
        sed -i "s|pipelinesascode.tekton.dev/original-prname:.*|pipelinesascode.tekton.dev/original-prname: \"java-quarkus-*\"|g" ./dependencies/kyverno/policy/e2e-reduce-resources.yaml
        kubectl create -f  ./dependencies/kyverno/policy/e2e-reduce-resources.yaml
      shell: bash

    # konflux-ui repo is cloned to /home/runner/work/konflux-ui/konflux-ui/konflux-ui
    - name: Checkout Konflux-UI Repository
      uses: actions/checkout@v4
      with:
        ref: "${{ github.event.pull_request.head.sha }}"
        path: 'konflux-ui'

    - name: Build konflux-ui image
      env:
        CYPRESS_GH_TOKEN: ${{ inputs.hac-test-gh-token }}
        TARGET_BRANCH: ${{ github.base_ref }}
        SOURCE_BRANCH: ${{ github.head_ref }}
        PR_NUMBER: ${{ github.event.number }}
        HEAD_SHA: "${{ github.event.pull_request.head.sha }}"
        SEALIGHTS_TOKEN: "${{ inputs.sealights-token }}"
        FORKED_REPO_URL: ${{ github.event.pull_request.head.repo.clone_url }}
        BASE_REPO_URL: ${{ github.event.pull_request.base.repo.clone_url }}
        JOB_TYPE: ${{ inputs.job-type }}
      run: |
        ./konflux-ui/pr_check.sh build
      shell: bash

    - name: Deploying Konflux
      run: |
        ./deploy-konflux.sh
      shell: bash

    - name: List namespaces
      run: |
        kubectl get namespace
      shell: bash

    - name: Deploy test resources
      run: |
        ./deploy-test-resources.sh
      shell: bash

    - name: Prepare resources for E2E tests
      # Sets secrets, deploys image controller and setup smee.
      env:
        APP_ID: ${{ inputs.gh-app-id }}
        APP_PRIVATE_KEY: ${{ inputs.gh-app-private-key }}
        APP_WEBHOOK_SECRET: ${{ inputs.gh-app-webhook-secret }}
        QUAY_ORG: ${{ inputs.quay-test-org }}
        QUAY_TOKEN: ${{ inputs.quay-token-test }}
        SMEE_CHANNEL: ${{ inputs.smee-url }}
      run: |
        ./test/e2e/prepare-e2e.sh
      shell: bash

    - name: Install Konflux-UI and run tests
      env:
        CYPRESS_GH_TOKEN: ${{ inputs.hac-test-gh-token }}
        TARGET_BRANCH: ${{ github.base_ref }}
        PR_NUMBER: ${{ github.event.number }}
        HEAD_SHA: "${{ github.event.pull_request.head.sha }}"
        CYPRESS_USERNAME: "${{ inputs.cypress-username }}"
        CYPRESS_PASSWORD: "${{ inputs.cypress-password }}"
        SEALIGHTS_TOKEN: "${{ inputs.sealights-token }}"
      run: | 
        ./konflux-ui/pr_check.sh test
      shell: bash
    
    - name: Generate error logs
      if: ${{ !cancelled() }}
      run: |
        ./generate-err-logs.sh
        cp -r konflux-ui/artifacts logs
      shell: bash

    - name: Archive logs
      if: ${{ !cancelled() }}
      uses: actions/upload-artifact@v4
      with:
        name: logs
        path: logs
